<article class="post-card glass glass-hover">
    <div class="post-card-meta">
        {{ if not .Date.IsZero }}
        <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "Jan 2, 2006" }}</time>
        <span aria-hidden="true">·</span>
        {{ end }}
        <span>{{ .ReadingTime }} min read</span>
    </div>
    <h3 class="post-card-title"><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
    <p class="post-card-summary">{{ .Summary | plainify | truncate 150 }}</p>
    {{ with .Params.tags }}
    <div class="post-card-tags">
        {{ range first 3 . }}
        <a class="chip" href="{{ printf "/tags/%s/" (. | urlize) | relURL }}">#{{ . }}</a>
        {{ end }}
    </div>
    {{ end }}
</article>
